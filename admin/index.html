<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin — Fearless Store</title>
    <link rel="stylesheet" href="../assets/css/style.css">
  </head>
  <body>
    <nav class="nav"><div class="brand">Fearless Admin</div><div class="nav-links"><a href="../index.html">Store</a></div></nav>
    <main class="container">
      <h2>Admin Panel</h2>
      <div style="display:flex;gap:18px;align-items:flex-start">
        <div style="flex:1">
          <h3>Add / Edit Product</h3>
          <form id="product-form" class="card">
            <input name="name" placeholder="Name" required>
            <input name="category" placeholder="Category">
            <input name="price" placeholder="Price" type="number" step="0.01">
            <input name="stock" placeholder="Stock" type="number">
            <input id="image-file" name="image" type="file" accept="image/*">
            <input name="id" placeholder="(leave blank for new)" style="margin-top:6px">
            <div style="margin-top:8px"><button class="btn" id="save">Save</button> <button class="btn ghost" id="delete" type="button">Delete</button></div>
          </form>
        </div>
        <div style="flex:2">
          <h3>Products</h3>
          <div id="products-list" class="grid"></div>
          <h3 style="margin-top:18px">Orders</h3>
          <div id="orders"></div>
        </div>
      </div>
      <div style="margin-top:20px">
        <h3>Dashboard</h3>
        <div id="dashboard" class="card"></div>
      </div>
    </main>
    <script type="module" src="../assets/js/admin.js"></script>
  </body>
</html>
