<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Fearless Store</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <nav class="nav"><div class="brand">Fearless Store</div><div class="nav-links"><a href="index.html">Home</a><a href="catalog.html">Catalog</a></div></nav>
    <main class="container">
      <div class="card" style="max-width:420px;margin:auto">
        <h2>Sign in / Register</h2>
        <form id="auth">
          <input name="email" placeholder="Email" type="email" required style="width:100%">
          <input name="password" placeholder="Password" type="password" required style="width:100%;margin-top:8px">
          <div style="margin-top:12px;display:flex;gap:8px">
            <button id="signin" class="btn" type="button">Sign In</button>
            <button id="register" class="btn ghost" type="button">Register</button>
          </div>
        </form>
        <div style="margin-top:12px"><a href="admin/index.html">Admin Panel</a></div>
      </div>
    </main>
    <script type="module" src="assets/js/auth.js"></script>
  </body>
</html>
